<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机搜救轨迹分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .status {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #aaa;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 80px - 160px);
        }

        .canvas-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #trajectoryCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 8px;
            background: radial-gradient(ellipse at center, #0d1b2a 0%, #020810 100%);
        }

        .view-controls {
            position: absolute;
            top: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .view-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .view-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .view-btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .panel-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .panel-section h3 {
            font-size: 15px;
            margin-bottom: 12px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-section h3::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(180deg, #00d4ff, #7b2ff7);
            border-radius: 2px;
        }

        .drone-legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .drone-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-size: 13px;
        }

        .drone-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .drone-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            box-shadow: 0 0 6px currentColor;
        }

        .battery-bar {
            width: 50px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .battery-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff5722, #ffc107, #4caf50);
            transition: width 0.3s;
        }

        .metric-card {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #7b2ff7;
        }

        .metric-card:last-child {
            margin-bottom: 0;
        }

        .metric-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .metric-sub {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .overlap-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 6px;
        }

        .overlap-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #00d4ff);
            transition: width 0.3s;
        }

        .playback-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px 30px;
            margin: 0 20px 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .speed-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .progress-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
        }

        .progress-bar-container {
            position: relative;
            height: 24px;
            display: flex;
            align-items: center;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .time-display {
            font-family: "Courier New", monospace;
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
            min-width: 100px;
            text-align: center;
            flex-shrink: 0;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 12px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .toggle-row:last-child {
            margin-bottom: 0;
        }

        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 11px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle.on {
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle.on::after {
            transform: translateX(18px);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚁 无人机搜救轨迹分析系统</h1>
        <div class="status">
            <div class="status-item">
                <div class="status-dot"></div>
                <span id="statusText">正在连接服务器...</span>
            </div>
            <div class="status-item">
                <span>🛰️ 无人机:</span>
                <span id="droneCount">0</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="canvas-wrapper">
            <div class="canvas-container">
                <canvas id="trajectoryCanvas"></canvas>
                <div id="loadingOverlay" class="loading-overlay">
                    <div class="spinner"></div>
                </div>
                <div class="view-controls">
                    <button class="view-btn active" data-view="xy">XY 平面</button>
                    <button class="view-btn" data-view="xz">XZ 平面</button>
                    <button class="view-btn" data-view="yz">YZ 平面</button>
                    <button class="view-btn" data-view="3d">3D 视图</button>
                </div>
            </div>
        </div>

        <div class="side-panel">
            <div class="panel-section">
                <h3>无人机状态</h3>
                <div id="droneLegend" class="drone-legend"></div>
            </div>

            <div class="panel-section">
                <h3>显示设置</h3>
                <div class="toggle-row">
                    <span>显示完整轨迹</span>
                    <div id="toggleFullTrajectory" class="toggle on"></div>
                </div>
                <div class="toggle-row">
                    <span>显示重叠区域</span>
                    <div id="toggleOverlap" class="toggle on"></div>
                </div>
                <div class="toggle-row">
                    <span>显示距离连线</span>
                    <div id="toggleDistance" class="toggle on"></div>
                </div>
                <div class="toggle-row">
                    <span>显示网格</span>
                    <div id="toggleGrid" class="toggle on"></div>
                </div>
            </div>

            <div class="panel-section">
                <h3>最短协同距离</h3>
                <div id="distanceMetrics"></div>
            </div>

            <div class="panel-section">
                <h3>轨迹重叠度</h3>
                <div id="overlapMetrics"></div>
            </div>
        </div>
    </div>

    <div class="playback-container">
        <div class="playback-controls">
            <button id="playBtn" class="play-btn">▶</button>
            <select id="speedSelect" class="speed-select">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
                <option value="4">4x</option>
                <option value="8">8x</option>
            </select>
            <div class="progress-wrapper">
                <div class="progress-labels">
                    <span id="startTime">00:00</span>
                    <span id="endTime">00:00</span>
                </div>
                <div class="progress-bar-container">
                    <input type="range" id="progressSlider" min="0" max="100" value="0" step="0.1">
                </div>
            </div>
            <div class="time-display" id="timeDisplay">00:00.0</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const DRONE_COLORS = ['#00d4ff', '#ff6b6b', '#ffd93d', '#6bcf7f', '#c490e4', '#ff9f43'];

        let state = {
            trajectories: [],
            shortestDistances: [],
            overlaps: [],
            overlapRegions: [],
            timeRange: [0, 120],
            currentTime: 0,
            isPlaying: false,
            playSpeed: 1,
            lastFrameTime: 0,
            viewMode: 'xy',
            showFullTrajectory: true,
            showOverlap: true,
            showDistance: true,
            showGrid: true,
            droneColors: {},
            bounds: { minX: 0, maxX: 300, minY: 0, maxY: 300, minZ: 0, maxZ: 150 }
        };

        const canvas = document.getElementById('trajectoryCanvas');
        const ctx = canvas.getContext('2d');

        const EPS = 1e-8;
        const SAFE_EPS = 1e-6;

        function safeNum(val, def = 0) {
            return (val === null || val === undefined || typeof val !== 'number' || isNaN(val) || !isFinite(val)) ? def : val;
        }

        function safePos(pos) {
            if (!pos) return { x: 0, y: 0, z: 0, battery: 0 };
            return {
                x: safeNum(pos.x),
                y: safeNum(pos.y),
                z: safeNum(pos.z),
                battery: safeNum(pos.battery)
            };
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            draw();
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${s.toFixed(1).padStart(4, '0')}`;
        }

        function getDronePositionAtTime(droneId, time) {
            const traj = state.trajectories.find(t => t.drone_id === droneId);
            if (!traj || traj.points.length === 0) return null;

            const points = traj.points;
            time = safeNum(time);

            if (time <= safeNum(points[0].timestamp) + SAFE_EPS) {
                return safePos(points[0]);
            }
            if (time >= safeNum(points[points.length - 1].timestamp) - SAFE_EPS) {
                return safePos(points[points.length - 1]);
            }

            for (let i = 0; i < points.length - 1; i++) {
                const t0 = safeNum(points[i].timestamp);
                const t1 = safeNum(points[i + 1].timestamp);
                if (t0 <= time && time <= t1) {
                    const dt = t1 - t0;
                    let ratio = 0;
                    if (Math.abs(dt) > SAFE_EPS) {
                        ratio = (time - t0) / dt;
                        ratio = Math.max(0, Math.min(1, ratio));
                    }
                    const p0 = safePos(points[i]);
                    const p1 = safePos(points[i + 1]);
                    return {
                        x: p0.x + ratio * (p1.x - p0.x),
                        y: p0.y + ratio * (p1.y - p0.y),
                        z: p0.z + ratio * (p1.z - p0.z),
                        battery: p0.battery + ratio * (p1.battery - p0.battery)
                    };
                }
            }
            return safePos(points[0]);
        }

        function worldToScreen(x, y, z) {
            x = safeNum(x);
            y = safeNum(y);
            z = safeNum(z);

            const w = Math.max(1, canvas.width / (window.devicePixelRatio || 1));
            const h = Math.max(1, canvas.height / (window.devicePixelRatio || 1));
            const padding = 40;

            let rangeX = safeNum(state.bounds.maxX - state.bounds.minX);
            let rangeY = safeNum(state.bounds.maxY - state.bounds.minY);
            let rangeZ = safeNum(state.bounds.maxZ - state.bounds.minZ);

            if (Math.abs(rangeX) < SAFE_EPS) rangeX = 1.0;
            if (Math.abs(rangeY) < SAFE_EPS) rangeY = 1.0;
            if (Math.abs(rangeZ) < SAFE_EPS) rangeZ = 1.0;

            let sx = w / 2;
            let sy = h / 2;
            const scale = Math.min((w - 2 * padding) / rangeX, (h - 2 * padding) / Math.max(rangeY, rangeZ));
            const safeScale = isFinite(scale) && scale > 0 ? scale : 1.0;

            switch (state.viewMode) {
                case 'xy':
                    sx = padding + (x - state.bounds.minX) * safeScale;
                    sy = h - padding - (y - state.bounds.minY) * safeScale;
                    break;
                case 'xz':
                    sx = padding + (x - state.bounds.minX) * safeScale;
                    sy = h - padding - (z - state.bounds.minZ) * safeScale;
                    break;
                case 'yz':
                    sx = padding + (y - state.bounds.minY) * safeScale;
                    sy = h - padding - (z - state.bounds.minZ) * safeScale;
                    break;
                case '3d':
                    const angleX = 30 * Math.PI / 180;
                    const angleY = 45 * Math.PI / 180;
                    const cx = (state.bounds.minX + state.bounds.maxX) / 2;
                    const cy = (state.bounds.minY + state.bounds.maxY) / 2;
                    const cz = (state.bounds.minZ + state.bounds.maxZ) / 2;
                    const dx = x - cx, dy = y - cy, dz = z - cz;
                    const rx = dx * Math.cos(angleY) - dy * Math.sin(angleY);
                    const ry = dx * Math.sin(angleY) + dy * Math.cos(angleY);
                    const rz = dz;
                    const finalX = rx;
                    const finalY = ry * Math.cos(angleX) - rz * Math.sin(angleX);
                    sx = w / 2 + finalX * safeScale * 0.8;
                    sy = h / 2 + finalY * safeScale * 0.8;
                    break;
            }
            return { x: safeNum(sx, w / 2), y: safeNum(sy, h / 2) };
        }

        function drawGrid() {
            if (!state.showGrid) return;
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;

            const steps = 10;
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                let x1, y1, x2, y2;

                if (state.viewMode === 'xy') {
                    const xVal = state.bounds.minX + t * (state.bounds.maxX - state.bounds.minX);
                    const p1 = worldToScreen(xVal, state.bounds.minY, 0);
                    const p2 = worldToScreen(xVal, state.bounds.maxY, 0);
                    x1 = p1.x; y1 = p1.y; x2 = p2.x; y2 = p2.y;
                } else if (state.viewMode === 'xz') {
                    const xVal = state.bounds.minX + t * (state.bounds.maxX - state.bounds.minX);
                    const p1 = worldToScreen(xVal, 0, state.bounds.minZ);
                    const p2 = worldToScreen(xVal, 0, state.bounds.maxZ);
                    x1 = p1.x; y1 = p1.y; x2 = p2.x; y2 = p2.y;
                } else if (state.viewMode === 'yz') {
                    const yVal = state.bounds.minY + t * (state.bounds.maxY - state.bounds.minY);
                    const p1 = worldToScreen(0, yVal, state.bounds.minZ);
                    const p2 = worldToScreen(0, yVal, state.bounds.maxZ);
                    x1 = p1.x; y1 = p1.y; x2 = p2.x; y2 = p2.y;
                } else {
                    continue;
                }

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                if (state.viewMode === 'xy') {
                    const yVal = state.bounds.minY + t * (state.bounds.maxY - state.bounds.minY);
                    const p1 = worldToScreen(state.bounds.minX, yVal, 0);
                    const p2 = worldToScreen(state.bounds.maxX, yVal, 0);
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                } else if (state.viewMode === 'xz') {
                    const zVal = state.bounds.minZ + t * (state.bounds.maxZ - state.bounds.minZ);
                    const p1 = worldToScreen(state.bounds.minX, 0, zVal);
                    const p2 = worldToScreen(state.bounds.maxX, 0, zVal);
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                } else if (state.viewMode === 'yz') {
                    const zVal = state.bounds.minZ + t * (state.bounds.maxZ - state.bounds.minZ);
                    const p1 = worldToScreen(0, state.bounds.minY, zVal);
                    const p2 = worldToScreen(0, state.bounds.maxY, zVal);
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = '10px sans-serif';
            const labelX1 = worldToScreen(state.bounds.minX, state.bounds.minY, state.bounds.minZ);
            const labelX2 = worldToScreen(state.bounds.maxX, state.bounds.minY, state.bounds.minZ);
            ctx.fillText('X', labelX2.x - 10, labelX2.y + 15);
        }

        function drawFullTrajectories() {
            if (!state.showFullTrajectory) return;

            state.trajectories.forEach(traj => {
                const color = state.droneColors[traj.drone_id];
                if (!color || traj.points.length < 2) return;

                ctx.strokeStyle = color + '40';
                ctx.lineWidth = 2;
                ctx.beginPath();

                traj.points.forEach((p, i) => {
                    const pos = worldToScreen(p.x, p.y, p.z);
                    if (i === 0) {
                        ctx.moveTo(pos.x, pos.y);
                    } else {
                        ctx.lineTo(pos.x, pos.y);
                    }
                });
                ctx.stroke();

                const lastIdx = traj.points.findIndex(p => p.timestamp > state.currentTime);
                const drawUpTo = lastIdx === -1 ? traj.points.length : lastIdx + 1;
                if (drawUpTo >= 2) {
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    for (let i = 0; i < drawUpTo && i < traj.points.length; i++) {
                        const p = traj.points[i];
                        const pos = worldToScreen(p.x, p.y, p.z);
                        if (i === 0) {
                            ctx.moveTo(pos.x, pos.y);
                        } else {
                            ctx.lineTo(pos.x, pos.y);
                        }
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            });
        }

        function drawOverlapRegions() {
            if (!state.showOverlap) return;

            state.overlapRegions.forEach(region => {
                if (!region.points || region.points.length === 0) return;

                const colorA = state.droneColors[region.drone_a] || '#ffffff';
                const colorB = state.droneColors[region.drone_b] || '#ffffff';

                region.points.forEach(p => {
                    if (p.timestamp > state.currentTime) return;

                    const posA = worldToScreen(p.point_a[0], p.point_a[1], p.point_a[2]);
                    const posB = worldToScreen(p.point_b[0], p.point_b[1], p.point_b[2]);
                    const midX = (posA.x + posB.x) / 2;
                    const midY = (posA.y + posB.y) / 2;

                    const grad = ctx.createRadialGradient(midX, midY, 0, midX, midY, 25);
                    grad.addColorStop(0, 'rgba(255, 217, 61, 0.4)');
                    grad.addColorStop(1, 'rgba(255, 217, 61, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(midX, midY, 25, 0, Math.PI * 2);
                    ctx.fill();
                });
            });
        }

        function drawDistanceLines(currentPositions) {
            if (!state.showDistance) return;

            const ids = Object.keys(currentPositions);
            for (let i = 0; i < ids.length; i++) {
                for (let j = i + 1; j < ids.length; j++) {
                    const posA = safePos(currentPositions[ids[i]]);
                    const posB = safePos(currentPositions[ids[j]]);

                    const sA = worldToScreen(posA.x, posA.y, posA.z);
                    const sB = worldToScreen(posB.x, posB.y, posB.z);

                    const dx = posA.x - posB.x;
                    const dy = posA.y - posB.y;
                    const dz = posA.z - posB.z;
                    const sq = dx * dx + dy * dy + dz * dz;
                    const dist = sq >= 0 && isFinite(sq) ? Math.sqrt(sq) : 0;
                    const safeDist = safeNum(dist, 0);

                    ctx.strokeStyle = safeDist < 50 ? 'rgba(255, 107, 107, 0.6)' : 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = safeDist < 50 ? 2 : 1;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(sA.x, sA.y);
                    ctx.lineTo(sB.x, sB.y);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    const midX = (sA.x + sB.x) / 2;
                    const midY = (sA.y + sB.y) / 2;
                    ctx.fillStyle = safeDist < 50 ? '#ff6b6b' : 'rgba(255, 255, 255, 0.5)';
                    ctx.font = 'bold 11px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(safeDist.toFixed(1) + 'm', midX, midY - 5);
                }
            }
        }

        function drawDrones(currentPositions) {
            Object.entries(currentPositions).forEach(([droneId, pos]) => {
                if (!pos) return;
                const color = state.droneColors[droneId] || '#ffffff';
                const sp = worldToScreen(pos.x, pos.y, pos.z);

                const pulseSize = 15 + Math.sin(Date.now() / 200) * 3;
                const grad = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, pulseSize);
                grad.addColorStop(0, color + '80');
                grad.addColorStop(1, color + '00');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(sp.x, sp.y, pulseSize, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(sp.x, sp.y, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(droneId.replace('drone_', 'D'), sp.x, sp.y + 3);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = '10px monospace';
                ctx.fillText(`Z:${pos.z.toFixed(0)}m`, sp.x, sp.y + 20);
            });
        }

        function draw() {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, w, h);

            drawGrid();
            drawFullTrajectories();
            drawOverlapRegions();

            const currentPositions = {};
            state.trajectories.forEach(traj => {
                const pos = getDronePositionAtTime(traj.drone_id, state.currentTime);
                if (pos) currentPositions[traj.drone_id] = pos;
            });

            drawDistanceLines(currentPositions);
            drawDrones(currentPositions);

            updateSidePanel(currentPositions);
        }

        function updateSidePanel(currentPositions) {
            const legend = document.getElementById('droneLegend');
            legend.innerHTML = '';
            state.trajectories.forEach(traj => {
                const pos = currentPositions[traj.drone_id];
                const battery = pos ? pos.battery : 0;
                const color = state.droneColors[traj.drone_id];
                const div = document.createElement('div');
                div.className = 'drone-item';
                div.innerHTML = `
                    <div class="drone-info">
                        <div class="drone-color" style="background:${color};color:${color}"></div>
                        <span>${traj.drone_id}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div class="battery-bar">
                            <div class="battery-fill" style="width:${battery}%"></div>
                        </div>
                        <span style="font-size:11px;color:#888;">${battery.toFixed(0)}%</span>
                    </div>
                `;
                legend.appendChild(div);
            });

            const distMetrics = document.getElementById('distanceMetrics');
            distMetrics.innerHTML = '';
            state.shortestDistances.slice(0, 3).forEach(d => {
                const div = document.createElement('div');
                div.className = 'metric-card';
                const colorA = state.droneColors[d.drone_a];
                const colorB = state.droneColors[d.drone_b];
                div.innerHTML = `
                    <div class="metric-label">
                        <span style="color:${colorA}">${d.drone_a}</span> ↔ 
                        <span style="color:${colorB}">${d.drone_b}</span>
                    </div>
                    <div class="metric-value">${d.distance.toFixed(2)} m</div>
                    <div class="metric-sub">@ t=${formatTime(d.timestamp)}</div>
                `;
                distMetrics.appendChild(div);
            });
            if (state.shortestDistances.length === 0) {
                distMetrics.innerHTML = '<div style="font-size:12px;color:#666;">暂无数据</div>';
            }

            const overlapMetrics = document.getElementById('overlapMetrics');
            overlapMetrics.innerHTML = '';
            state.overlaps.slice(0, 3).forEach(o => {
                const div = document.createElement('div');
                div.className = 'metric-card';
                const colorA = state.droneColors[o.drone_a];
                const colorB = state.droneColors[o.drone_b];
                div.innerHTML = `
                    <div class="metric-label">
                        <span style="color:${colorA}">${o.drone_a}</span> ↔ 
                        <span style="color:${colorB}">${o.drone_b}</span>
                    </div>
                    <div class="metric-value">${(o.overlap_ratio * 100).toFixed(1)}%</div>
                    <div class="overlap-bar">
                        <div class="overlap-fill" style="width:${o.overlap_ratio * 100}%"></div>
                    </div>
                    <div class="metric-sub">重叠 ${o.overlap_points_count}/${o.total_points_count} 个采样点</div>
                `;
                overlapMetrics.appendChild(div);
            });
            if (state.overlaps.length === 0) {
                overlapMetrics.innerHTML = '<div style="font-size:12px;color:#666;">暂无数据</div>';
            }
        }

        function animate(timestamp) {
            if (state.lastFrameTime === 0) state.lastFrameTime = timestamp;
            const delta = (timestamp - state.lastFrameTime) / 1000;
            state.lastFrameTime = timestamp;

            if (state.isPlaying) {
                state.currentTime += delta * state.playSpeed;
                const t0 = safeNum(state.timeRange[0]);
                const t1 = safeNum(state.timeRange[1]);
                if (state.currentTime > t1) {
                    state.currentTime = t0;
                }
                const dt = t1 - t0;
                const progress = Math.abs(dt) > SAFE_EPS ? ((state.currentTime - t0) / dt) * 100 : 0;
                document.getElementById('progressSlider').value = safeNum(progress, 0);
                document.getElementById('timeDisplay').textContent = formatTime(state.currentTime);
            }

            draw();
            requestAnimationFrame(animate);
        }

        async function loadData() {
            try {
                document.getElementById('loadingOverlay').style.display = 'flex';
                document.getElementById('statusText').textContent = '正在加载数据...';

                const analyzeRes = await fetch(`${API_BASE}/api/analyze?overlap_threshold=50`);
                if (!analyzeRes.ok) throw new Error('分析接口失败');
                const data = await analyzeRes.json();

                state.trajectories = data.trajectories;
                state.shortestDistances = data.shortest_distances;
                state.overlaps = data.overlaps;
                state.timeRange = data.time_range;
                state.currentTime = data.time_range[0];

                state.trajectories.forEach((traj, i) => {
                    state.droneColors[traj.drone_id] = DRONE_COLORS[i % DRONE_COLORS.length];
                });

                let minX = Infinity, maxX = -Infinity;
                let minY = Infinity, maxY = -Infinity;
                let minZ = Infinity, maxZ = -Infinity;
                state.trajectories.forEach(traj => {
                    traj.points.forEach(p => {
                        const px = safeNum(p.x), py = safeNum(p.y), pz = safeNum(p.z);
                        minX = Math.min(minX, px); maxX = Math.max(maxX, px);
                        minY = Math.min(minY, py); maxY = Math.max(maxY, py);
                        minZ = Math.min(minZ, pz); maxZ = Math.max(maxZ, pz);
                    });
                });

                if (!isFinite(minX) || !isFinite(maxX)) { minX = 0; maxX = 100; }
                if (!isFinite(minY) || !isFinite(maxY)) { minY = 0; maxY = 100; }
                if (!isFinite(minZ) || !isFinite(maxZ)) { minZ = 0; maxZ = 100; }

                const pad = 20;
                state.bounds = {
                    minX: safeNum(minX - pad, 0),
                    maxX: safeNum(maxX + pad, 100),
                    minY: safeNum(minY - pad, 0),
                    maxY: safeNum(maxY + pad, 100),
                    minZ: safeNum(Math.max(0, minZ - pad), 0),
                    maxZ: safeNum(maxZ + pad, 100)
                };

                const overlapRes = await fetch(`${API_BASE}/api/overlap-regions?overlap_threshold=50`);
                if (overlapRes.ok) {
                    const overlapData = await overlapRes.json();
                    state.overlapRegions = overlapData.regions;
                }

                document.getElementById('droneCount').textContent = state.trajectories.length;
                document.getElementById('statusText').textContent = '数据已加载';
                document.getElementById('startTime').textContent = formatTime(state.timeRange[0]);
                document.getElementById('endTime').textContent = formatTime(state.timeRange[1]);
                document.getElementById('timeDisplay').textContent = formatTime(state.currentTime);
                document.getElementById('loadingOverlay').style.display = 'none';

            } catch (err) {
                console.error(err);
                document.getElementById('statusText').textContent = '加载失败: ' + err.message;
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        document.getElementById('playBtn').addEventListener('click', function () {
            state.isPlaying = !state.isPlaying;
            this.textContent = state.isPlaying ? '⏸' : '▶';
        });

        document.getElementById('speedSelect').addEventListener('change', function (e) {
            state.playSpeed = parseFloat(e.target.value);
        });

        document.getElementById('progressSlider').addEventListener('input', function (e) {
            const progress = safeNum(parseFloat(e.target.value), 0) / 100;
            const t0 = safeNum(state.timeRange[0]);
            const t1 = safeNum(state.timeRange[1]);
            state.currentTime = t0 + Math.max(0, Math.min(1, progress)) * (t1 - t0);
            document.getElementById('timeDisplay').textContent = formatTime(state.currentTime);
        });

        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                state.viewMode = this.dataset.view;
                draw();
            });
        });

        function setupToggle(id, stateKey) {
            const el = document.getElementById(id);
            el.addEventListener('click', function () {
                state[stateKey] = !state[stateKey];
                this.classList.toggle('on', state[stateKey]);
                draw();
            });
        }

        setupToggle('toggleFullTrajectory', 'showFullTrajectory');
        setupToggle('toggleOverlap', 'showOverlap');
        setupToggle('toggleDistance', 'showDistance');
        setupToggle('toggleGrid', 'showGrid');

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        loadData();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
